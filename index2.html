<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe Multiplayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #1d202b;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 4px 16px #0004;
        }

        #status {
            margin: 24px 0 12px 0;
            font-size: 1.2em;
            min-height: 30px;
            font-weight: 500;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-gap: 10px;
            margin-bottom: 24px;
            perspective: 600px;
            display: none;
        }

        .cell {
            width: 90px;
            height: 90px;
            font-size: 2.7em;
            background: #23263a;
            border-radius: 20px;
            text-align: center;
            line-height: 90px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 20px #0002;
            border: 2px solid #2d324b;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .cell:hover:not(.filled):not(.winner) {
            background: #353b5c;
            transform: scale(1.05) rotateZ(-2deg);
        }

        .cell.filled {
            cursor: default;
            opacity: 0.7;
        }

        .cell.winner {
            background: #47e676;
            color: #23263a;
            animation: winner-cell 1s ease-in-out;
            border-color: #47e676 !important;
            box-shadow: 0 0 32px #47e67666;
        }

        @keyframes winner-cell {
            0% {
                box-shadow: 0 0 0px #47e67666;
            }

            30% {
                box-shadow: 0 0 32px #47e67666;
            }

            100% {
                box-shadow: 0 0 32px #47e67666;
            }
        }

        .player-x {
            color: #5ad1ff;
            text-shadow: 0 0 8px #5ad1ff77;
        }

        .player-o {
            color: #ff7c6a;
            text-shadow: 0 0 8px #ff7c6a77;
        }

        button {
            background: linear-gradient(90deg, #5ad1ff 40%, #47e676 100%);
            color: #1d202b;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            padding: 12px 32px;
            font-size: 1em;
            margin-top: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px #0003;
            transition: background 0.3s;
        }

        button:hover {
            background: linear-gradient(90deg, #47e676 40%, #5ad1ff 100%);
            color: #23263a;
        }

        #resetBtn {
            display: none;
        }

        #login-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        #login-container input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 1em;
            outline: none;
            width: 200px;
            text-align: center;
        }

        #login-status {
            margin-top: 10px;
            font-size: 1em;
        }
    </style>
</head>

<body>
    <h1>Tic Tac Toe Multiplayer</h1>

    <div id="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="login-status"></div>
    </div>

    <div id="status">Loading...</div>
    <div class="board" id="board"></div>
    <button id="resetBtn" onclick="resetGame()">Reset Game</button>

    <script>
        // Hardcoded users with passwords
        const USERS = [
            { username: "player1", password: "pass1", symbol: "X", style: "player-x" },
            { username: "player2", password: "pass2", symbol: "O", style: "player-o" }
        ];

        const owner = "TheGlitchh";
        const repo = "TheGlitchh.github.io";
        const branch = "temp";
        const filePath = "tictactoe.json";

        const OAUTH_KEY = "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"; // replace with your demo key

        let gameState = null;
        let winnerCells = [];
        let loggedInUser = null;

        function login() {
            const uname = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const statusDiv = document.getElementById("login-status");

            const user = USERS.find(u => u.username === uname && u.password === pass);
            if (!user) {
                statusDiv.textContent = "❌ Invalid username or password";
                return;
            }

            loggedInUser = user;
            localStorage.setItem("tictactoe_user", user.username);
            statusDiv.textContent = `✅ Logged in as ${user.username}`;
            document.getElementById("login-container").style.display = "none";
            document.getElementById("board").style.display = "grid";
            document.getElementById("resetBtn").style.display = "block";
        }

        window.onload = () => {
            const savedUser = localStorage.getItem("tictactoe_user");
            if (savedUser) {
                loggedInUser = USERS.find(u => u.username === savedUser);
                if (loggedInUser) {
                    document.getElementById("login-container").style.display = "none";
                    document.getElementById("board").style.display = "grid";
                    document.getElementById("resetBtn").style.display = "block";
                }
            }
        };

        async function fetchGameState() {
            const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}?${Date.now()}`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Could not fetch game state.");
                gameState = await res.json();
                renderBoard();
                updateStatus();
            } catch (err) {
                document.getElementById('status').textContent = "Error loading game: " + err.message;
            }
        }

        async function pushGameState() {
            const updateUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
            const payload = {
                message: "Update Tic Tac Toe game state",
                content: btoa(JSON.stringify(gameState, null, 2)), // simpler base64 encoding
                branch
            };

            try {
                const res = await fetch(updateUrl, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${OAUTH_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.message || "Failed to push game state.");
                }

                await fetchGameState();
            } catch (err) {
                alert("Failed to push game state: " + err.message);
            }
        }

        function renderBoard() {
            winnerCells = getWinnerCells();
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            gameState.moves.forEach((cell, idx) => {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                if (cell) cellDiv.classList.add('filled');
                if (winnerCells.includes(idx)) cellDiv.classList.add('winner');
                if (cell === "X") cellDiv.classList.add('player-x');
                if (cell === "O") cellDiv.classList.add('player-o');
                cellDiv.textContent = cell;
                cellDiv.onclick = () => handleMove(idx);
                boardDiv.appendChild(cellDiv);
            });
        }

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if (!gameState) return;
            if (winnerCells.length) {
                statusDiv.textContent = `Winner: ${USERS[gameState.current_player].symbol}!`;
            } else if (gameState.moves.every(cell => cell)) {
                statusDiv.textContent = "It's a draw!";
            } else {
                statusDiv.textContent = `Current Player: ${USERS[gameState.current_player].username} (${USERS[gameState.current_player].symbol})`;
            }
        }

        function handleMove(idx) {
            fetchGameState().then(() => {
                if (!loggedInUser) {
                    alert("You must log in first!");
                    return;
                }
                const currentUser = USERS[gameState.current_player];
                if (loggedInUser.username !== currentUser.username) {
                    alert("Not your turn!");
                    return;
                }
                if (gameState.moves[idx] || winnerCells.length) return;

                gameState.moves[idx] = currentUser.symbol;
                if (!getWinnerCells().length) {
                    gameState.current_player = 1 - gameState.current_player;
                }
                pushGameState();
                renderBoard();
                updateStatus();
            });
        }

        function getWinnerCells() {
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            for (const line of lines) {
                const [a, b, c] = line;
                if (gameState.moves[a] &&
                    gameState.moves[a] === gameState.moves[b] &&
                    gameState.moves[a] === gameState.moves[c]) {
                    return line;
                }
            }
            return [];
        }

        function resetGame() {
            gameState = {
                users: USERS,
                moves: ["", "", "", "", "", "", "", "", ""],
                current_player: 0
            };
            pushGameState();
            renderBoard();
            updateStatus();
        }

        setInterval(fetchGameState, 2000);
        fetchGameState();
    </script>
</body>

</html>
